spring.application.name=spare-parts-inventory
server.port=${PORT:8080}
server.servlet.context-path=/api

# JWT - use environment variable on Render
jwt.secret=${JWT_SECRET:qSt1VBtVDX72xPYetFyExyMt2jp9ybihP5QIBugNrCv}
jwt.expiration=86400000

# Active profile - set to 'postgresql' on Render via env var
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Logging
logging.level.root=INFO
logging.level.com.spareparts=INFO
logging.level.org.springframework.security=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Disable whitelabel error
server.error.whitelabel.enabled=false
spring.web.resources.add-mappings=false
