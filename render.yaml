services:
  - type: web
    name: spare-parts-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend.onrender.com  # update after deploying frontend
      - key: DATABASE_URL
        fromDatabase:
          name: spare-parts-db
          property: connectionString

databases:
  - name: spare-parts-db
    databaseName: spare_parts_db
    user: spare_parts_user
    plan: free
